name: Build macOS DMG

on:
  workflow_call:

jobs:
  build-microscope-dmg:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Setup JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        # jpackage --app-version must be numeric (major[.minor[.patch]]); drop any -b<n> suffix.
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "DMG_VERSION=${VERSION%%-*}" >> $GITHUB_OUTPUT

    - name: Build macOS DMG
      env:
        JEFFREY_TAG_VERSION: ${{ steps.version.outputs.VERSION }}
      run: >
        mvn -e -pl build/build-microscope-dmg -am -Pdmg package -DskipTests
        -Djpackage.app.version=${{ steps.version.outputs.DMG_VERSION }}

    - name: Rename DMG with architecture
      run: |
        mv build/build-microscope-dmg/target/dist/Jeffrey-*.dmg \
           build/build-microscope-dmg/target/dist/microscope-${{ matrix.arch }}.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v7
      with:
        name: microscope-dmg-${{ matrix.arch }}
        path: build/build-microscope-dmg/target/dist/microscope-${{ matrix.arch }}.dmg
