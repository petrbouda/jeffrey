name: Build macOS DMG

on:
  workflow_call:

jobs:
  build-microscope-dmg:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Setup JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # Reuse the already-assembled fat jar from the Linux build job instead of recompiling the
    # project on macOS (macOS runners lack the proto/grpc toolchain the source build needs).
    - name: Download microscope.jar
      uses: actions/download-artifact@v8
      with:
        name: microscope-jar
        path: ./microscope-jar

    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        # jpackage --app-version must be numeric (major[.minor[.patch]]); drop any -b<n> suffix.
        echo "DMG_VERSION=${VERSION%%-*}" >> $GITHUB_OUTPUT

    # No -am: the dmg module no longer depends on core-microscope, so only jpackage runs here.
    - name: Build macOS DMG
      run: >
        mvn -e -pl build/build-microscope-dmg -Pdmg package -DskipTests
        -Dmicroscope.source.dir=${{ github.workspace }}/microscope-jar
        -Djpackage.app.version=${{ steps.version.outputs.DMG_VERSION }}

    - name: Rename DMG with architecture
      run: |
        mv build/build-microscope-dmg/target/dist/Jeffrey-*.dmg \
           build/build-microscope-dmg/target/dist/microscope-${{ matrix.arch }}.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v7
      with:
        name: microscope-dmg-${{ matrix.arch }}
        path: build/build-microscope-dmg/target/dist/microscope-${{ matrix.arch }}.dmg
