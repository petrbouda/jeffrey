name: Build macOS DMG

# Apple Silicon (arm64) only. GitHub no longer offers free Intel (x86_64) macOS runners, so a
# native Intel DMG can't be built on hosted CI; Intel Macs can run microscope.jar with Java 25.
on:
  workflow_call:

jobs:
  build-microscope-dmg:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6

    - name: Setup JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # Reuse the already-assembled fat jar from the Linux build job instead of recompiling the
    # project on macOS (macOS runners lack the proto/grpc toolchain the source build needs).
    - name: Download microscope.jar
      uses: actions/download-artifact@v8
      with:
        name: microscope-jar
        path: ./microscope-jar

    # No -am: the dmg module no longer depends on core-microscope, so only jpackage runs here.
    # No app-version override: the module pins a macOS-valid 1.0.0 (Jeffrey is pre-1.0, and macOS
    # rejects bundle versions whose first number is 0).
    - name: Build macOS DMG
      run: >
        mvn -e -pl build/build-microscope-dmg -Pdmg package -DskipTests
        -Dmicroscope.source.dir=${{ github.workspace }}/microscope-jar

    - name: Rename DMG with architecture
      run: |
        mv build/build-microscope-dmg/target/dist/Jeffrey-*.dmg \
           build/build-microscope-dmg/target/dist/microscope-arm64.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v7
      with:
        name: microscope-dmg-arm64
        path: build/build-microscope-dmg/target/dist/microscope-arm64.dmg
