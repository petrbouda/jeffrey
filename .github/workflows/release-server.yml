name: Docker Server Image (Jib)

on:
  workflow_call:

jobs:
  docker-server:
    runs-on: ubuntu-latest
    container:
      image: petrbouda/jeffrey-builder:25

    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    # Stage the bundled /jeffrey-libs/ artifacts into Jib's extraDirectories source.
    # Jib's convention: build/build-server-jib/src/main/jib/<path> → /<path> in the image.
    - name: Download jeffrey-cli.jar
      uses: actions/download-artifact@v4
      with:
        name: jeffrey-cli-jar
        path: ./build/build-server-jib/src/main/jib/jeffrey-libs

    - name: Download jeffrey-agent.jar
      uses: actions/download-artifact@v4
      with:
        name: jeffrey-agent-jar
        path: ./build/build-server-jib/src/main/jib/jeffrey-libs

    - name: Download native CLI (amd64)
      uses: actions/download-artifact@v4
      with:
        name: jeffrey-cli-amd64
        path: ./build/build-server-jib/src/main/jib/jeffrey-libs/cli-amd64

    - name: Download async-profiler (linux/amd64)
      run: |
        AP_VERSION=$(curl -s https://api.github.com/repos/async-profiler/async-profiler/releases/latest \
          | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
        curl -L "https://github.com/async-profiler/async-profiler/releases/download/v${AP_VERSION}/async-profiler-${AP_VERSION}-linux-x64.tar.gz" \
          | tar -xz -C /tmp
        cp /tmp/async-profiler-*/lib/libasyncProfiler.so ./build/build-server-jib/src/main/jib/jeffrey-libs/libasyncProfiler.so
        rm -rf /tmp/async-profiler-*

    - name: Stage native CLI binary
      run: |
        mv ./build/build-server-jib/src/main/jib/jeffrey-libs/cli-amd64/jeffrey-cli \
           ./build/build-server-jib/src/main/jib/jeffrey-libs/jeffrey-cli-amd64
        rm -rf ./build/build-server-jib/src/main/jib/jeffrey-libs/cli-amd64
        ls -la ./build/build-server-jib/src/main/jib/jeffrey-libs/

    # Two-step: jib: prefix goal can only be invoked at the project level, so we install
    # the reactor up to build-server-jib first, then run jib:build scoped to that module.
    - name: Install reactor up to build-server-jib
      env:
        JEFFREY_TAG_VERSION: ${{ steps.version.outputs.VERSION }}
      run: mvn -pl build/build-server-jib -am -DskipTests=true install

    - name: Build & push image with Jib
      env:
        JIB_TO_AUTH_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        JIB_TO_AUTH_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        mvn -pl build/build-server-jib compile jib:build \
          -Djib.from.platforms=linux/amd64 \
          -Djib.to.image=petrbouda/jeffrey-server:${{ steps.version.outputs.VERSION }} \
          -Djib.to.tags=latest
