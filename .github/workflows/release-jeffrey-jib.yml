name: Publish jeffrey-jib to Maven Central
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0 or 0.1.0-b5). Must follow [0-9]+.[0-9]+.[0-9]+(-b[0-9]+)?'
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: utilities/jeffrey-jib
    steps:
      - uses: actions/checkout@v6
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-b[0-9]+)?$ ]]; then
            echo "ERROR: version '${{ inputs.version }}' does not match [0-9]+.[0-9]+.[0-9]+(-b[0-9]+)?" >&2
            exit 1
          fi
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Set version
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DprocessAllModules=true
      - name: Publish package
        run: mvn -P release --batch-mode deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
