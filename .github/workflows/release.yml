on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+-b[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-b[0-9]+'

name: Release Jeffrey

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: petrbouda/jeffrey-builder:25
    permissions: write-all

    steps:
    - uses: actions/checkout@v6

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build with Maven
      env:
        JEFFREY_TAG_VERSION: ${{ steps.version.outputs.VERSION }}
      run: mvn clean package

    - name: Upload microscope.jar
      uses: actions/upload-artifact@v7
      with:
        name: microscope-jar
        path: ./build/build-microscope/target/microscope.jar

    - name: Upload jeffrey-hub.jar
      uses: actions/upload-artifact@v7
      with:
        name: jeffrey-hub-jar
        path: ./build/build-hub/target/jeffrey-hub.jar

    - name: Upload jeffrey-performance-analyst.jar
      uses: actions/upload-artifact@v7
      with:
        name: jeffrey-performance-analyst-jar
        path: ./build/build-performance-analyst/target/jeffrey-performance-analyst.jar

    - name: Upload provisioner.jar
      uses: actions/upload-artifact@v7
      with:
        name: provisioner-jar
        path: ./build/build-provisioner/target/provisioner.jar

    - name: Upload jeffrey-agent.jar
      uses: actions/upload-artifact@v7
      with:
        name: jeffrey-agent-jar
        path: ./build/build-agent/target/jeffrey-agent.jar

  provisioner-native:
    uses: ./.github/workflows/release-provisioner.yml

  docker-microscope:
    needs: [build]
    uses: ./.github/workflows/release-microscope.yml
    secrets: inherit

  docker-hub:
    needs: [build, provisioner-native]
    uses: ./.github/workflows/release-hub.yml
    secrets: inherit

  docker-performance-analyst:
    needs: [build, provisioner-native]
    uses: ./.github/workflows/release-performance-analyst.yml
    secrets: inherit

  create-release:
    needs: [docker-microscope, docker-hub, docker-performance-analyst, provisioner-native]
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download microscope.jar
      uses: actions/download-artifact@v8
      with:
        name: microscope-jar
        path: ./artifacts

    - name: Download jeffrey-hub.jar
      uses: actions/download-artifact@v8
      with:
        name: jeffrey-hub-jar
        path: ./artifacts

    - name: Download jeffrey-performance-analyst.jar
      uses: actions/download-artifact@v8
      with:
        name: jeffrey-performance-analyst-jar
        path: ./artifacts

    - name: Download provisioner.jar
      uses: actions/download-artifact@v8
      with:
        name: provisioner-jar
        path: ./artifacts

    - name: Download jeffrey-agent.jar
      uses: actions/download-artifact@v8
      with:
        name: jeffrey-agent-jar
        path: ./artifacts

    - name: Download native provisioner (amd64)
      uses: actions/download-artifact@v8
      with:
        name: provisioner-amd64
        path: ./artifacts/native-amd64

    - name: Download native provisioner (arm64)
      uses: actions/download-artifact@v8
      with:
        name: provisioner-arm64
        path: ./artifacts/native-arm64

    - name: Prepare release assets
      run: |
        mv ./artifacts/native-amd64/provisioner ./artifacts/provisioner-amd64
        mv ./artifacts/native-arm64/provisioner ./artifacts/provisioner-arm64
        rm -rf ./artifacts/native-amd64 ./artifacts/native-arm64

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: jreleaser/release-action@v2
      with:
        arguments: full-release
      env:
        JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.VERSION }}
        JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
        JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

    - name: Upload JReleaser logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: jreleaser-release-output
        path: |
          out/jreleaser/trace.log
          out/jreleaser/output.properties
