on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+-b[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-b[0-9]+'

name: Release Jeffrey

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: petrbouda/jeffrey-builder:25
    permissions: write-all

    steps:
    - uses: actions/checkout@v6

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build with Maven
      env:
        JEFFREY_TAG_VERSION: ${{ steps.version.outputs.VERSION }}
      run: mvn clean package

    - name: Upload microscope.jar
      uses: actions/upload-artifact@v7
      with:
        name: microscope-jar
        path: ./build/build-microscope/target/microscope.jar

    - name: Upload jeffrey-server.jar
      uses: actions/upload-artifact@v7
      with:
        name: jeffrey-server-jar
        path: ./build/build-server/target/jeffrey-server.jar

    - name: Upload jeffrey-cli.jar
      uses: actions/upload-artifact@v7
      with:
        name: jeffrey-cli-jar
        path: ./build/build-cli/target/jeffrey-cli.jar

    - name: Upload jeffrey-agent.jar
      uses: actions/upload-artifact@v7
      with:
        name: jeffrey-agent-jar
        path: ./build/build-agent/target/jeffrey-agent.jar

  cli-native:
    uses: ./.github/workflows/release-cli.yml

  # jpackage is platform-bound — each runner emits only the installer formats its OS supports.
  # microscope (the user-facing analyzer) is the only target; jeffrey-server is headless and
  # ships as a jar / java-archive / Docker image instead.
  jpackage:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            classifier: osx-aarch64
            types: 'dmg pkg'
          - os: macos-13
            classifier: osx-x86_64
            types: 'dmg pkg'
          - os: windows-latest
            classifier: windows-x86_64
            types: 'msi'
          - os: ubuntu-latest
            classifier: linux-x86_64
            types: 'deb rpm'
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Extract version
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Setup JDK 25 (provides jpackage)
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Download microscope.jar
      uses: actions/download-artifact@v8
      with:
        name: microscope-jar
        path: ./jpkg-input

    - name: Install rpm tooling (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y rpm fakeroot binutils

    - name: Install WiX Toolset (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        choco install wixtoolset --version=3.14.1 -y --no-progress
        echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

    - name: Build installers
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: |
        for type in ${{ matrix.types }}; do
          bash build/scripts/jpackage.sh "$type" ./jpkg-input ./installers "$VERSION"
        done

    - name: Rename installers with version and platform classifier
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
        CLASSIFIER: ${{ matrix.classifier }}
      run: |
        cd installers
        for f in *; do
          ext="${f##*.}"
          mv -v "$f" "microscope-${VERSION}-${CLASSIFIER}.${ext}"
        done

    - name: Upload installers
      uses: actions/upload-artifact@v7
      with:
        name: installers-${{ matrix.classifier }}
        path: ./installers/*

  docker-microscope:
    needs: [build]
    uses: ./.github/workflows/release-microscope.yml
    secrets: inherit

  docker-server:
    needs: [build, cli-native]
    uses: ./.github/workflows/release-server.yml
    secrets: inherit

  release:
    needs: [build, cli-native, jpackage, docker-microscope, docker-server]
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
    - name: Checkout (full history for changelog)
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Setup JDK 25 (runs JReleaser + java-archive assembly)
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Download fat jars
      uses: actions/download-artifact@v8
      with:
        pattern: '*-jar'
        path: ./artifacts
        merge-multiple: true

    - name: Download native CLI (amd64)
      uses: actions/download-artifact@v8
      with:
        name: jeffrey-cli-amd64
        path: ./artifacts/native-amd64

    - name: Download native CLI (arm64)
      uses: actions/download-artifact@v8
      with:
        name: jeffrey-cli-arm64
        path: ./artifacts/native-arm64

    - name: Download installers
      uses: actions/download-artifact@v8
      with:
        pattern: 'installers-*'
        path: ./artifacts/installers
        merge-multiple: true

    - name: Stage release assets
      run: |
        mv ./artifacts/native-amd64/jeffrey-cli ./artifacts/jeffrey-cli-amd64
        mv ./artifacts/native-arm64/jeffrey-cli ./artifacts/jeffrey-cli-arm64
        rm -rf ./artifacts/native-amd64 ./artifacts/native-arm64
        ls -la ./artifacts ./artifacts/installers

    # Signing reuses the repository's existing GPG_PRIVATE_KEY / GPG_PASSPHRASE secrets (the
    # same pair the Maven Central publish workflows use). It activates only when the key is
    # present; otherwise the release proceeds unsigned (still checksummed) instead of failing.
    - name: Determine signing mode
      id: signing
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      run: |
        if [ -n "$GPG_PRIVATE_KEY" ]; then
          echo "active=RELEASE" >> "$GITHUB_OUTPUT"
        else
          echo "active=NEVER" >> "$GITHUB_OUTPUT"
        fi

    - name: Import GPG key
      if: steps.signing.outputs.active == 'RELEASE'
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        gpg --list-secret-keys --keyid-format long

    # The Homebrew cask (microscope) is pushed to the petrbouda/homebrew-tap repository, which the
    # default GITHUB_TOKEN cannot write to. Publish the cask only when a cross-repo PAT
    # (HOMEBREW_TAP_TOKEN) is configured; otherwise skip the brew packager so the core release
    # still succeeds. When publishing, that PAT also becomes the release token (it can both
    # create the release here and push to the tap).
    - name: Determine Homebrew publishing
      id: brew
      env:
        TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        if [ -n "$TAP_TOKEN" ]; then
          echo "args=full-release" >> "$GITHUB_OUTPUT"
        else
          echo "args=full-release --exclude-packager brew" >> "$GITHUB_OUTPUT"
        fi

    - name: Assemble java-archive distributions
      uses: jreleaser/release-action@v2
      with:
        arguments: assemble
      env:
        JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.VERSION }}
        JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run JReleaser full-release
      uses: jreleaser/release-action@v2
      with:
        arguments: ${{ steps.brew.outputs.args }}
      env:
        JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.VERSION }}
        JRELEASER_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        JRELEASER_SIGNING_ACTIVE: ${{ steps.signing.outputs.active }}
        JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    - name: Upload JReleaser logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: jreleaser-release-output
        path: |
          out/jreleaser/trace.log
          out/jreleaser/output.properties
