syntax = "proto3";

package jeffrey.server.api.v1;

option java_package = "pbouda.jeffrey.server.api.v1";
option java_multiple_files = true;

import "jeffrey/server/api/v1/common.proto";

// Manages projects within a workspace — listing, deletion, and restoration.
// Projects represent monitored applications and are auto-created from
// workspace events when the CLI detects a new application.
service ProjectService {
  // Lists all projects in a workspace.
  // By default, soft-deleted projects are excluded. Set include_deleted
  // to true to include them (e.g., for UI toggles).
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // Gets detailed information about a single project.
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);

  // Deletes a project by publishing a PROJECT_DELETED workspace event.
  // The actual deletion is processed asynchronously by the event pipeline.
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // Restores a previously soft-deleted project, clearing the deleted_at
  // timestamp and making the project active again.
  rpc RestoreProject(RestoreProjectRequest) returns (RestoreProjectResponse);

  // Updates the streaming enabled flag for a project.
  // Setting streaming_enabled overrides the workspace/global setting for this project.
  // Omitting streaming_enabled resets to inherit from workspace/global.
  rpc UpdateProjectStreaming(UpdateProjectStreamingRequest) returns (UpdateProjectStreamingResponse);
}

message ListProjectsRequest {
  // The workspace containing the projects.
  string workspace_id = 1;
  // When true, includes soft-deleted projects in the response.
  bool include_deleted = 2;
}

message ListProjectsResponse {
  repeated ProjectInfo projects = 1;
}

message GetProjectRequest {
  string workspace_id = 1;
  string project_id = 2;
}

message GetProjectResponse {
  ProjectInfo project = 1;
}

message DeleteProjectRequest {
  string workspace_id = 1;
  string project_id = 2;
}

message DeleteProjectResponse {}

message RestoreProjectRequest {
  string workspace_id = 1;
  string project_id = 2;
}

message RestoreProjectResponse {}

message UpdateProjectStreamingRequest {
  string workspace_id = 1;
  string project_id = 2;
  // The streaming override. If not set, resets to inherit from workspace/global.
  optional bool streaming_enabled = 3;
}

message UpdateProjectStreamingResponse {}

// Detailed information about a project and its current state.
message ProjectInfo {
  // Internal unique identifier for the project.
  string id = 1;
  // Origin project ID from the workspace (used for synchronization tracking).
  string origin_id = 2;
  // Project name (can be renamed by the user).
  string name = 3;
  // Optional display label (shown in UI if set, otherwise name is used).
  string label = 4;
  // Optional namespace for grouping related projects.
  string namespace = 5;
  // Creation timestamp (epoch millis).
  int64 created_at = 6;
  // ID of the workspace this project belongs to.
  string workspace_id = 7;
  // Current recording status.
  RecordingStatus status = 8;
  // Number of active and finished recording sessions.
  int32 session_count = 9;
  reserved 10; // was is_blocked (removed)
  // Project-level streaming override. If not set, inherits from the workspace/global setting.
  // If set to true/false, overrides the workspace and global settings for this project.
  optional bool streaming_enabled = 11;
  // Soft-deletion timestamp (epoch millis). Present only for deleted projects.
  optional int64 deleted_at = 12;
}
