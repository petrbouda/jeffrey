syntax = "proto3";

package jeffrey.server.api.v1;

option java_package = "pbouda.jeffrey.server.api.v1";
option java_multiple_files = true;

import "jeffrey/server/api/v1/common.proto";

// Manages project instances — running JVM processes that produce profiling data.
// Each instance represents a single JVM lifecycle (start to finish) and contains
// one or more recording sessions.
service InstanceService {
  // Lists all instances for a project, in all lifecycle states.
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);

  // Gets detailed information about a single instance.
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse);

  // Lists all recording sessions within a specific instance.
  rpc ListInstanceSessions(ListInstanceSessionsRequest) returns (ListInstanceSessionsResponse);

  // Returns the full detail payload for a single instance, including
  // filesystem-backed storage statistics. Walks the instance's session
  // directories on disk, so it is heavier than ListInstances — call it
  // only when needed (e.g. when the user expands a row in the UI).
  rpc GetInstanceDetail(GetInstanceDetailRequest) returns (GetInstanceDetailResponse);
}

message ListInstancesRequest {
  string project_id = 1;
  // When true, each InstanceInfo in the response is populated with its full list of sessions.
  // Callers that only need instance metadata should leave this false to avoid payload bloat.
  bool include_sessions = 2;
}

message ListInstancesResponse {
  repeated InstanceInfo instances = 1;
}

message GetInstanceRequest {
  string instance_id = 1;
}

message GetInstanceResponse {
  InstanceInfo instance = 1;
}

message ListInstanceSessionsRequest {
  string instance_id = 1;
}

message ListInstanceSessionsResponse {
  repeated InstanceSessionInfo sessions = 1;
}

message GetInstanceDetailRequest {
  string instance_id = 1;
}

message GetInstanceDetailResponse {
  // Identity, lifecycle, and sessions. Sessions are always populated in this response.
  InstanceInfo instance = 1;
  // Filesystem-backed aggregates for the instance's recordings.
  InstanceStats stats = 2;
  // Parsed JFR one-shot configuration / environment events. Unset when the
  // instance has no finished recording chunk yet.
  optional InstanceEnvironment environment = 3;
}

// Aggregated storage statistics for a single instance, computed by walking
// the instance's session directories on disk.
message InstanceStats {
  int32 file_count = 1;
  int64 total_size_bytes = 2;
}

// Strongly typed payload of one-shot JFR events describing the JVM's
// runtime environment. Each field is optional because older JDKs may not
// emit a given event (e.g. non-containerised hosts have no ContainerConfiguration).
message InstanceEnvironment {
  optional JvmInformation jvm = 1;
  optional OsInformation os = 2;
  optional CpuInformation cpu = 3;
  optional GcConfiguration gc = 4;
  optional GcHeapConfiguration gc_heap = 5;
  optional CompilerConfiguration compiler = 6;
  optional ContainerConfiguration container = 7;
  optional VirtualizationInformation virtualization = 8;
  // Populated only for FINISHED instances whose final JFR chunk contains jdk.Shutdown.
  optional ShutdownInfo shutdown = 9;
}

// From jdk.JVMInformation.
message JvmInformation {
  optional string jvm_name = 1;
  optional string jvm_version = 2;
  optional string jvm_arguments = 3;
  optional string jvm_flags = 4;
  optional string java_arguments = 5;
  optional int64 jvm_start_time = 6;  // epoch millis
  optional int64 pid = 7;
}

// From jdk.OSInformation.
message OsInformation {
  optional string os_version = 1;
}

// From jdk.CPUInformation.
message CpuInformation {
  optional string cpu = 1;
  optional string description = 2;
  optional int32 sockets = 3;
  optional int32 cores = 4;
  optional int32 hw_threads = 5;
}

// From jdk.GCConfiguration.
message GcConfiguration {
  optional string young_collector = 1;
  optional string old_collector = 2;
  optional int32 parallel_gc_threads = 3;
  optional int32 concurrent_gc_threads = 4;
  optional bool uses_dynamic_gc_threads = 5;
  optional bool is_explicit_gc_concurrent = 6;
  optional bool is_explicit_gc_disabled = 7;
  optional int64 pause_target_millis = 8;
  optional int32 gc_time_ratio = 9;
}

// From jdk.GCHeapConfiguration.
message GcHeapConfiguration {
  optional int64 min_size = 1;  // bytes
  optional int64 max_size = 2;
  optional int64 initial_size = 3;
  optional bool uses_compressed_oops = 4;
  optional string compressed_oops_mode = 5;
  optional int64 object_alignment = 6;  // bytes
  optional int32 heap_address_bits = 7;
}

// From jdk.CompilerConfiguration.
message CompilerConfiguration {
  optional int32 thread_count = 1;
  optional bool tiered_compilation = 2;
  optional bool dynamic_compiler_thread_count = 3;
}

// From jdk.ContainerConfiguration.
message ContainerConfiguration {
  optional string container_type = 1;
  optional int64 cpu_slice_period = 2;    // microseconds
  optional int64 cpu_quota = 3;            // microseconds
  optional int64 cpu_shares = 4;
  optional int32 effective_cpu_count = 5;
  optional int64 memory_soft_limit = 6;    // bytes
  optional int64 memory_limit = 7;
  optional int64 swap_memory_limit = 8;
  optional int64 host_total_memory = 9;
  optional int64 host_total_swap_memory = 10;
}

// From jdk.VirtualizationInformation.
message VirtualizationInformation {
  optional string name = 1;
}

// From jdk.Shutdown. Emitted at JVM exit on a clean shutdown.
message ShutdownInfo {
  // Free-form reason as written by HotSpot, e.g. "Shutdown requested from Java",
  // "VM Error", "CrashOnOutOfMemoryError".
  optional string reason = 1;
  // Wall-clock time the JVM recorded the shutdown event (epoch millis).
  optional int64 event_time = 2;
  // Classification of the reason string into a small stable set of categories.
  // Allows the UI to pick an icon / colour without re-implementing the
  // HotSpot string match. UNKNOWN means the reason didn't match any of the
  // values the JDK sources are known to emit — third-party JVMs may produce
  // custom strings which the UI should still display verbatim.
  optional ShutdownKind kind = 3;
}

// Classification of jdk.Shutdown.reason. Strings that map to each value
// are fixed in the OpenJDK sources (jvm.cpp::JVM_BeforeHalt,
// jfrEmergencyDump.cpp::post_events).
enum ShutdownKind {
  SHUTDOWN_KIND_UNSPECIFIED = 0;
  // "Shutdown requested from Java" — the normal graceful path:
  // System.exit / Runtime.exit / last non-daemon thread / SIGINT/SIGTERM/SIGHUP
  // (via java.lang.Terminator) / DestroyJavaVM.
  SHUTDOWN_KIND_GRACEFUL = 1;
  // "VM Error" — fatal VM error (SIGSEGV, assertion, guarantee failure).
  // Usually accompanied by an hs_err_pid*.log file.
  SHUTDOWN_KIND_VM_ERROR = 2;
  // "CrashOnOutOfMemoryError" — the JVM was started with
  // -XX:+CrashOnOutOfMemoryError and an OOM triggered the crash. JDK 24+.
  SHUTDOWN_KIND_CRASH_OOM = 3;
  // Reason didn't match any known string. UI should show reason verbatim.
  SHUTDOWN_KIND_UNKNOWN = 4;
}

// A project instance — represents a single JVM process lifecycle.
// Instances transition through states: PENDING -> ACTIVE -> FINISHED -> EXPIRED.
message InstanceInfo {
  // Unique identifier for the instance.
  string id = 1;
  // Human-readable display name for this instance.
  string instance_name = 2;
  // Current lifecycle status.
  InstanceStatus status = 3;
  // Timestamp when the instance was first detected (epoch millis).
  int64 created_at = 4;
  // Timestamp when the instance finished, all sessions completed (epoch millis).
  optional int64 finished_at = 5;
  // Timestamp when the instance is scheduled for expiration cleanup (epoch millis).
  optional int64 expiring_at = 6;
  // Timestamp when the instance was expired and cleaned up (epoch millis).
  optional int64 expired_at = 7;
  // Number of recording sessions in this instance.
  int32 session_count = 8;
  // ID of the currently active session, if any.
  optional string active_session_id = 9;
  // Full session list. Populated only when ListInstancesRequest.include_sessions is true; otherwise empty.
  repeated InstanceSessionInfo sessions = 10;
}

// A recording session within an instance.
// Each session corresponds to a continuous profiling period.
message InstanceSessionInfo {
  // Unique identifier for the session.
  string id = 1;
  // ID of the repository storing the session's recording files.
  string repository_id = 2;
  // Timestamp when the session started (epoch millis).
  int64 created_at = 3;
  // Timestamp when the session finished, heartbeat went stale or JVM stopped (epoch millis).
  optional int64 finished_at = 4;
  // Whether this session is currently active (streaming events).
  bool is_active = 5;
}
