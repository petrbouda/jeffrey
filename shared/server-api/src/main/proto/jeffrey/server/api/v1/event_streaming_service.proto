syntax = "proto3";

package jeffrey.server.api.v1;

option java_package = "pbouda.jeffrey.server.api.v1";
option java_multiple_files = true;

// Provides server-streaming RPCs for accessing JFR events from a session:
// live streaming from the JFR repository, or replay from dumped recording files.
// Events are delivered as EventBatch messages with typed fields.
service EventStreamingService {
  // Live-streams JFR events from a session's streaming repository.
  // The stream stays open until the client disconnects or the session ends.
  rpc LiveStreaming(LiveStreamingRequest) returns (stream EventBatch);

  // Replays historical JFR events from dumped recording files for a session.
  // Reads events from .jfr/.jfr.lz4 files in chronological order and streams them back.
  // The stream ends when all matching events have been delivered.
  rpc ReplayStreaming(ReplayStreamingRequest) returns (stream EventBatch);
}

// Request to live-stream JFR events from a session's streaming repository.
// Always continuous — the stream stays open waiting for new events.
message LiveStreamingRequest {
  string session_id = 1;
  // JFR event types to receive (e.g. "jdk.GCHeapSummary", "jdk.CPULoad").
  // Empty = all events.
  repeated string event_types = 2;
  // Send empty batches as implicit heartbeats (default: false).
  // When true, a batch is sent every flush interval even if no events arrived.
  // Useful for client-side connection liveness detection.
  optional bool send_empty_batches = 3;
}

// Request to replay historical JFR events from dumped recording files.
message ReplayStreamingRequest {
  string session_id = 1;
  // JFR event types to receive. Empty = all events.
  repeated string event_types = 2;
  // Optional start time (epoch millis). Omit to read from the beginning.
  optional int64 start_time = 3;
  // Optional end time (epoch millis). Omit to read to the latest event.
  optional int64 end_time = 4;
  // Send empty batches as implicit heartbeats (default: false).
  optional bool send_empty_batches = 5;
}

// A batch of JFR events delivered on each flush cycle.
// May be empty when send_empty_batches is true (acts as heartbeat).
message EventBatch {
  repeated StreamingEvent events = 1;
}

// A single JFR event with typed fields.
message StreamingEvent {
  // JFR event type name (e.g. "jdk.GCHeapSummary", "jdk.CPULoad").
  string event_type = 1;
  // The session this event belongs to.
  string session_id = 2;
  // Event timestamp (epoch millis).
  int64 timestamp = 3;
  // Event fields with preserved types.
  map<string, TypedValue> fields = 4;
}

// A value with its type preserved from the JFR event.
// Annotations like @Timestamp, @Percentage, @Timespan are resolved:
// timestamps become epoch millis, timespans become nanoseconds, percentages stay as floats.
message TypedValue {
  oneof value {
    string string_value = 1;
    int64 long_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    float float_value = 5;
  }
}
