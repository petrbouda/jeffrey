# Jeffrey Hub Stub — local-only fake gRPC server.
# Headless (no embedded web server); only the gRPC server runs.
spring.main.web-application-type=none
spring.main.banner-mode=off

# gRPC listen port. Connect from the frontend with host=localhost, port=8989, Plaintext enabled.
jeffrey.hub.stub.grpc.port=8989

logging.level.cafe.jeffrey=INFO
