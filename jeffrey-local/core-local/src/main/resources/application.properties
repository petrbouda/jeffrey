# Server
# server.port=8080

# Core directories
# Multiple options to set it up:
# Program option: -Djeffrey.local.home.dir=...
# Environment Variable: JEFFREY_LOCAL_HOME_DIR=...
jeffrey.local.home.dir=${user.home}/.jeffrey-local
jeffrey.local.temp.dir=${jeffrey.local.home.dir}/temp

logging.level.pbouda.jeffrey=INFO

# AI Assistant
# Supported providers: claude, openai, none
jeffrey.local.ai.provider=none

# Anthropic models: claude-opus-4-6, claude-opus-4-5-20251101, claude-sonnet-4-5-20250929, claude-sonnet-4-20250514
# OpenAI models:    gpt-4o, gpt-4o-mini, o3-mini
jeffrey.local.ai.model=claude-opus-4-6
jeffrey.local.ai.max-tokens=128000
