# Auto-enable DEBUG level when debug-file-log profile is active.
# Console stays at INFO via ThresholdFilter in logback-spring.xml.
logging.level.cafe.jeffrey=DEBUG

# Custom log file path (default: ${jeffrey.hub.home.dir}/logs/jeffrey-debug.log)
jeffrey.hub.logging.debug-file.path=${jeffrey.hub.home.dir}/logs/jeffrey-debug.log
