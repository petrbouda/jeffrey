# Auto-enable TRACE level when trace-file-log profile is active.
# Console stays at INFO via ThresholdFilter in logback-spring.xml.
logging.level.cafe.jeffrey=TRACE

# Custom log file path (default: ${jeffrey.hub.home.dir}/logs/jeffrey-trace.log)
jeffrey.hub.logging.trace-file.path=${jeffrey.hub.home.dir}/logs/jeffrey-trace.log
