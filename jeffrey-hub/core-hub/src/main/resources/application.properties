# Server
# server.port=8080

# gRPC server (Spring gRPC auto-configuration). Health and reflection services are disabled
# to keep the exposed gRPC surface limited to Jeffrey's own services.
spring.grpc.server.port=9090
spring.grpc.server.health.enabled=false
spring.grpc.server.reflection.enabled=false

# Core directories
# Multiple options to set it up:
# Program option: -Djeffrey.hub.home.dir=...
# Environment Variable: JEFFREY_HUB_HOME_DIR=...
jeffrey.hub.home.dir=${user.home}/.jeffrey-hub
jeffrey.hub.temp.dir=${jeffrey.hub.home.dir}/temp

# Kubernetes-native discovery (optional). When enabled, the hub watches pods
# labeled jeffrey.cafe/enabled=true: the jeffrey.cafe/workspace label auto-creates
# the workspace on first sight, and pod termination finishes the instance's
# sessions immediately instead of waiting for heartbeat staleness.
# jeffrey.hub.kubernetes.enabled=true
# jeffrey.hub.kubernetes.namespace=            # empty = all namespaces
# jeffrey.hub.kubernetes.auto-create-workspaces=true

# Mutating admission webhook (optional, independent of the informer). When
# enabled, POST /api/kubernetes/webhook/mutate injects Jeffrey profiling into
# pods annotated jeffrey.cafe/enabled=true: shared PVC + emptyDir volumes, a
# provisioner init container, and JDK_JAVA_OPTIONS=@<argfile> on the target
# container. Requires HTTPS between the API server and the hub.
# jeffrey.hub.kubernetes.webhook.enabled=true
# jeffrey.hub.kubernetes.webhook.init-image=debian:stable-slim
# jeffrey.hub.kubernetes.webhook.pvc-claim-name=jeffrey-pvc

# Auto-create a workspace when a filesystem event arrives with an unknown
# reference id (non-Kubernetes counterpart of the discovery above).
# jeffrey.hub.workspaces.auto-create=true

logging.level.cafe.jeffrey=INFO

# Debug file logging writes DEBUG logs to a rolling file (console stays INFO)
# Rolling: 50MB per file, 7 days retention, 500MB total cap
# Override via env var: SPRING_PROFILES_INCLUDE=debug-file-log
# spring.profiles.include=trace-file-log
