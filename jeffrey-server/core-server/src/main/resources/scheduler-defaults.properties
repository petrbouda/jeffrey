# ----------------------------------------------------------------------------
# Built-in defaults for scheduler jobs
# ----------------------------------------------------------------------------
# Loaded as a low-precedence property source via @PropertySource on
# ServerAppConfiguration. application.properties overrides any field by simply
# redeclaring the same key; missing keys fall through to the values below.
#
# Property key shape: jeffrey.server.scheduler.jobs.<job-name>.<field>
# where <job-name> is the lower-kebab-case form of a JobType value.

# GLOBAL — run once per period
jeffrey.server.scheduler.jobs.workspace-events-replicator.enabled=true
jeffrey.server.scheduler.jobs.workspace-events-replicator.period=5s

jeffrey.server.scheduler.jobs.workspace-events-cleaner.enabled=true
jeffrey.server.scheduler.jobs.workspace-events-cleaner.period=1d
jeffrey.server.scheduler.jobs.workspace-events-cleaner.params.queue-events-retention=31d

# WORKSPACE — fan out across all workspaces
jeffrey.server.scheduler.jobs.projects-synchronizer.enabled=true
jeffrey.server.scheduler.jobs.projects-synchronizer.period=30s

jeffrey.server.scheduler.jobs.profiler-settings-synchronizer.enabled=true
jeffrey.server.scheduler.jobs.profiler-settings-synchronizer.period=5m
jeffrey.server.scheduler.jobs.profiler-settings-synchronizer.params.max-versions=5

# PROJECT — fan out across all projects in all workspaces
jeffrey.server.scheduler.jobs.project-instance-session-cleaner.enabled=true
jeffrey.server.scheduler.jobs.project-instance-session-cleaner.period=1h
jeffrey.server.scheduler.jobs.project-instance-session-cleaner.params.duration=7
jeffrey.server.scheduler.jobs.project-instance-session-cleaner.params.time-unit=Days

jeffrey.server.scheduler.jobs.project-instance-recording-cleaner.enabled=true
jeffrey.server.scheduler.jobs.project-instance-recording-cleaner.period=1h
jeffrey.server.scheduler.jobs.project-instance-recording-cleaner.params.duration=3
jeffrey.server.scheduler.jobs.project-instance-recording-cleaner.params.time-unit=Days

jeffrey.server.scheduler.jobs.expired-instance-cleaner.enabled=true
jeffrey.server.scheduler.jobs.expired-instance-cleaner.period=1h
jeffrey.server.scheduler.jobs.expired-instance-cleaner.params.duration=14
jeffrey.server.scheduler.jobs.expired-instance-cleaner.params.time-unit=Days

jeffrey.server.scheduler.jobs.repository-jfr-compression.enabled=true
jeffrey.server.scheduler.jobs.repository-jfr-compression.period=15m

jeffrey.server.scheduler.jobs.session-finished-detector.enabled=true
jeffrey.server.scheduler.jobs.session-finished-detector.period=30s
