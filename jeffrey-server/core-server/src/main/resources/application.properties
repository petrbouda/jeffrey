# Server
# server.port=8080

# Core directories
# Multiple options to set it up:
# Program option: -Djeffrey.server.home.dir=...
# Environment Variable: JEFFREY_SERVER_HOME_DIR=...
jeffrey.server.home.dir=${user.home}/.jeffrey-server
jeffrey.server.temp.dir=${jeffrey.server.home.dir}/temp

logging.level.pbouda.jeffrey=INFO

# Debug file logging writes DEBUG logs to a rolling file (console stays INFO)
# Rolling: 50MB per file, 7 days retention, 500MB total cap
# Override via env var: SPRING_PROFILES_INCLUDE=debug-file-log
spring.profiles.include=trace-file-log
