# Jeffrey CLI Init Command Configuration
# Usage: java -jar target/jeffrey-cli.jar init jeffrey-init.conf

# Path resolution:
# - jeffrey-home: read from this config (e.g. jeffrey-home = "/tmp/jeffrey");
#   if omitted, falls back to the JEFFREY_HOME environment variable.
# - profiler-path / agent-path: auto-derived as ${jeffrey-home}/libs/current/...
#   Set them explicitly only if the binaries live outside JEFFREY_HOME.

# Project identification
project {
    # Reference ID of the workspace on the target Jeffrey server.
    # The workspace must already exist on the server (create it via the local
    # UI's "Create Workspace" flow before running the CLI). Events for an
    # unknown reference ID are dropped server-side with a warning.
    workspace-ref-id = "uat"
    name = "jeffrey"
    label = "Jeffrey"
}

# Features

# Performance counters
# It's automatically used to detect finished session
perf-counters {
    enabled = true
}

# Heap dump on OutOfMemoryError
heap-dump {
    enabled = true
    type = "crash"  # "exit" or "crash"
}

# JVM logging with <<JEFFREY_CURRENT_SESSION>> placeholder for file path
# Use '-jvm.log' suffix to automatically recognize the file as a JVM log file by Jeffrey
jvm-logging {
    enabled = true
    command = "jfr*=trace:file=<<JEFFREY_CURRENT_SESSION>>/jfr-jvm.log::filecount=3,filesize=5m"
}

# Messaging - enables jeffrey.ImportantMessage JFR events
# with a dedicated repository for real-time message consumption
messaging {
    enabled = true
}

# Alerting - enables jeffrey.Alert JFR events
# with a dedicated repository for real-time alert consumption
alerting {
    enabled = true
}

# Streaming - controls the JFR streaming recording shared by messaging and heartbeat
streaming {
    max-age = "2d"  # How long to keep streaming data (e.g., 12h, 1d, 30m)
}

# Heartbeat - enables periodic jeffrey.Heartbeat JFR events
# for reliable session liveness detection
heartbeat {
    enabled = true
}

# Debug Non-Safepoints - enables more precise profiling by recording
# method information at non-safepoint locations
# Adds: -XX:+UnlockDiagnosticVMOptions -XX:+DebugNonSafepoints
debug-non-safepoints {
    enabled = true
}

# JDK Java Options - exports JDK_JAVA_OPTIONS environment variable
jdk-java-options {
    enabled = true
}

# Additional JVM options added to argfile/profiler settings (independent of JDK_JAVA_OPTIONS export)
additional-jvm-options = "-Xmx1200m -Xms1200m -XX:+UseG1GC -XX:+AlwaysPreTouch -Djeffrey.logging.trace-file.path=<<JEFFREY_CURRENT_SESSION>>/jeffrey-app.log"

# Attributes (key-value map)
# Supports HOCON substitution: ${VAR} (required) or ${?VAR} (optional)
attributes {
    cluster = "blue"
    namespace = "klingon"
}
