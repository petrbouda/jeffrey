# JReleaser configuration for deploying jeffrey-jib (multi-module) to Maven Central.
#
# JReleaser only performs the SIGN + UPLOAD of the artifacts that Maven has already
# staged into target/staging-deploy for every module (jeffrey-jib-core,
# jeffrey-jib-maven, jeffrey-jib-gradle, and the aggregator pom). It replaces the
# central-publishing-maven-plugin + maven-gpg-plugin that used to live in the pom's
# `release` profile.
#
# Invoked with `jreleaser deploy`, so no GitHub release/tag is created here.
project:
  name: jeffrey-jib
  description: JIB plugin extensions (Gradle and Maven) wrapping the container entrypoint so Jeffrey profiling initialises before the app starts
  authors:
    - Petr Bouda
  license: AGPL-3.0-only
  links:
    homepage: https://github.com/petrbouda/jeffrey

release:
  github:
    owner: petrbouda
    name: jeffrey
    # This config drives a Maven Central deploy only; never touch git/releases.
    skipTag: true
    skipRelease: true

signing:
  active: ALWAYS
  armored: true

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        applyMavenCentralRules: true
        stagingRepositories:
          - target/staging-deploy
