# Server
# server.port=8080

# Virtual threads (Tomcat request handling on virtual threads)
spring.threads.virtual.enabled=true

# Unlimited multipart uploads
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Jackson deserialization: null primitives -> default values
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Core directories
# Multiple options to set it up:
# Program option: -Djeffrey.performance-analyst.home.dir=...
# Environment Variable: JEFFREY_PERFORMANCE_ANALYST_HOME_DIR=...
jeffrey.performance-analyst.home.dir=${user.home}/.jeffrey-performance-analyst
jeffrey.performance-analyst.temp.dir=${jeffrey.performance-analyst.home.dir}/temp

logging.level.cafe.jeffrey=INFO

# Debug file logging writes DEBUG logs to a rolling file (console stays INFO)
# Override via env var: SPRING_PROFILES_INCLUDE=debug-file-log
# spring.profiles.include=trace-file-log
