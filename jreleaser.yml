# JReleaser configuration for Jeffrey.
#
# Scope (phases 1-3):
#   - GitHub release creation with an auto-generated, categorized changelog
#   - SHA-256 checksums for every asset
#   - Optional GPG signing (enabled when JReleaser GPG secrets are present)
#   - java-archive distributions (zip/tar.gz with launcher scripts) for microscope + server
#   - Attachment of the existing jars, Linux native CLI binaries, and the jpackage
#     installers (dmg/pkg/msi/deb/rpm) produced by the per-OS CI jobs
#
# Out of scope (intentionally): Docker images stay on Jib (build/build-*-jib) — JReleaser
# does not hook into the custom jeffrey-jib build-plan extension, so images are not managed
# here.
#
# The project version is supplied at runtime via JRELEASER_PROJECT_VERSION (the pushed git
# tag without the leading 'v'); the Maven reactor version is intentionally left at
# 1.0-SNAPSHOT, so it is not used as the release version.

project:
  name: jeffrey
  description: JFR Analyst - visualize and analyze Java Flight Recorder events
  longDescription: |
    Jeffrey is a JFR (Java Flight Recorder) analysis tool that visualizes JFR events using
    various types of graphs (flamegraphs, timeseries, sub-second, guardian, threads, heap dump
    analysis). It helps developers profile Java applications and find performance bottlenecks.
  authors:
    - Petr Bouda
  license: AGPL-3.0-or-later
  inceptionYear: '2024'
  links:
    homepage: https://www.jeffrey-analyst.cafe/
  languages:
    java:
      groupId: cafe.jeffrey
      version: '25'
      multiProject: true

release:
  github:
    owner: petrbouda
    name: jeffrey
    # The tag is already pushed by the maintainer; JReleaser reuses it instead of creating one.
    skipTag: true
    overwrite: true
    tagName: 'v{{projectVersion}}'
    releaseName: 'Jeffrey {{projectVersion}}'
    # Tags such as v0.10.0-b4 are pre-releases; full X.Y.Z tags are stable.
    prerelease:
      pattern: '.*-b\d+'
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        enabled: true

checksum:
  individual: true

# Signing reuses the repository's existing GPG_PRIVATE_KEY / GPG_PASSPHRASE secrets (the same
# ones the Maven Central publish workflows use). COMMAND mode signs via the gpg CLI against the
# key the CI job imports into the keyring, so no JReleaser-specific public/secret key secrets are
# needed. It activates only when GPG_PRIVATE_KEY is present (the CI job sets
# JRELEASER_SIGNING_ACTIVE=NEVER otherwise), so releases never fail for lack of a key.
signing:
  active: RELEASE
  armored: true
  mode: COMMAND

assemble:
  archive:
    microscope:
      active: ALWAYS
      formats:
        - ZIP
        - TAR_GZ
      archiveName: 'microscope-{{projectVersion}}'
      fileSets:
        - input: 'artifacts'
          output: 'lib'
          includes:
            - 'microscope.jar'
        - input: 'build/dist/microscope/bin'
          output: 'bin'
        - input: '.'
          includes:
            - 'LICENSE'
            - 'NOTICE.md'
            - 'README.md'
    jeffrey-server:
      active: ALWAYS
      formats:
        - ZIP
        - TAR_GZ
      archiveName: 'jeffrey-server-{{projectVersion}}'
      fileSets:
        - input: 'artifacts'
          output: 'lib'
          includes:
            - 'jeffrey-server.jar'
        - input: 'build/dist/jeffrey-server/bin'
          output: 'bin'
        - input: '.'
          includes:
            - 'LICENSE'
            - 'NOTICE.md'
            - 'README.md'

# Homebrew distribution for the macOS desktop app. microscope is shipped as a CASK that installs
# the .app bundle from the jpackage DMG, enabling:
#     brew install --cask petrbouda/tap/microscope
#
# The DMG artifacts (one per macOS architecture) are produced by the jpackage CI job and become
# this distribution's release assets; the cask references them with per-architecture stanzas.
# This is a NATIVE_PACKAGE distribution, kept separate from the microscope java-archive above so
# the cask only sees the .dmg artifacts.
#
# Publishing requires the petrbouda/homebrew-tap repository plus a token that can push to it. The
# CI job supplies a PAT via HOMEBREW_TAP_TOKEN and runs JReleaser with --exclude-packager brew
# when that secret is absent, so an unconfigured tap never breaks the core release.
distributions:
  microscope-app:
    type: NATIVE_PACKAGE
    artifacts:
      - path: 'artifacts/installers/microscope-{{projectVersion}}-osx-aarch64.dmg'
        platform: 'osx-aarch64'
      - path: 'artifacts/installers/microscope-{{projectVersion}}-osx-x86_64.dmg'
        platform: 'osx-x86_64'
    brew:
      active: RELEASE
      cask:
        enabled: true
        name: microscope
        displayName: Jeffrey Microscope
        appName: microscope.app
      tap:
        owner: petrbouda
        name: homebrew-tap
      commitAuthor:
        name: petrbouda
        email: bouda.petr@gmail.com

# Loose release assets staged into ./artifacts by the CI release job. The macOS DMGs are NOT
# listed here — they are uploaded as the microscope-app distribution's artifacts (above) so the
# cask can reference them; listing them here too would double-upload. The remaining installers
# (pkg/msi/deb/rpm), the four fat jars, and the Linux native CLI binaries are attached here.
files:
  active: ALWAYS
  globs:
    - pattern: 'artifacts/*.jar'
    - pattern: 'artifacts/jeffrey-cli-amd64'
    - pattern: 'artifacts/jeffrey-cli-arm64'
    - pattern: 'artifacts/installers/*.pkg'
    - pattern: 'artifacts/installers/*.msi'
    - pattern: 'artifacts/installers/*.deb'
    - pattern: 'artifacts/installers/*.rpm'
