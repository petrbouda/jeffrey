# JReleaser configuration for the main Jeffrey GitHub release.
#
# Scope: this file ONLY drives the GitHub release step (changelog + assets +
# checksums + signatures) of the tag-triggered pipeline. Docker images (Jib),
# the GraalVM native CLI, the Spring Boot jars and the agent jar are all still
# produced by Maven/Jib in the earlier jobs of .github/workflows/release.yml and
# are simply handed to JReleaser as pre-built files.
#
# The project version is NOT taken from the pom (which stays 1.0-SNAPSHOT). It is
# supplied at runtime via JRELEASER_PROJECT_VERSION, derived from the git tag.
project:
  name: jeffrey
  description: JFR (Java Flight Recorder) analysis tool
  authors:
    - Petr Bouda
  license: AGPL-3.0-only
  links:
    homepage: https://www.jeffrey-analyst.cafe/

release:
  github:
    owner: petrbouda
    name: jeffrey
    # Repository default branch is master, not JReleaser's default of main.
    branch: master
    # The tag is created by the git push that triggers the workflow, so JReleaser
    # must not try to create it again.
    skipTag: true
    # Make re-runs idempotent (update an existing release instead of failing).
    overwrite: true
    releaseName: 'Jeffrey {{projectVersion}}'
    prerelease:
      # Beta tags (vX.Y.Z-bN) are flagged as pre-releases automatically; the old
      # job always set prerelease=false, even for betas.
      pattern: '.*-b\d+'
    # No auto-generated changelog. Release notes are maintained manually at
    # https://www.jeffrey-analyst.cafe/release-notes, so instead of listing
    # commits the body is a fixed 'Release {version}' line. A non-empty body is
    # also required to stop GitHub from falling back to showing the tagged
    # commit's message on the release page.
    changelog:
      enabled: true
      content: 'Release {{projectVersion}}'

# Attach a SHA-256 checksums file to the release.
checksum:
  algorithms:
    - SHA-256

# Sign the release assets (and the checksums file) with GPG.
# Set active to NEVER if a signing key is not available yet (checksums still ship).
signing:
  active: ALWAYS
  armored: true

# The pre-built artifacts produced by the earlier jobs, staged by the workflow
# into ./artifacts before JReleaser runs.
files:
  artifacts:
    - path: artifacts/microscope.jar
    - path: artifacts/jeffrey-hub.jar
    - path: artifacts/jeffrey-cli.jar
    - path: artifacts/jeffrey-agent.jar
    - path: artifacts/jeffrey-cli-amd64
    - path: artifacts/jeffrey-cli-arm64
