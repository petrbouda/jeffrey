# Server
# server.port=8080

# Serve HTTP requests on virtual threads (Tomcat + Spring task executors). Requires JDK 21+.
# Note: under async-profiler, a long request can unmount/remount across carrier threads, which
# reduces the accuracy of the "events during span" thread+time correlation (carrier fragmentation).
spring.threads.virtual.enabled=true

# Multipart uploads — unlimited (JFR recordings and heap dumps can be multi-GB)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Jackson: accept missing/null primitive fields in request bodies and fall back to defaults
# (e.g. boolean -> false, int -> 0). Frees REST clients from having to send every primitive.
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Core directories
# Multiple options to set it up:
# Program option: -Djeffrey.microscope.home.dir=...
# Environment Variable: JEFFREY_LOCAL_HOME_DIR=...
jeffrey.microscope.home.dir=${user.home}/.jeffrey-microscope
jeffrey.microscope.temp.dir=${jeffrey.microscope.home.dir}/temp

# Version update check (set to false to disable GitHub release checking)
# jeffrey.microscope.update-check.enabled=true

# IDE integration is always available (shows onboarding until an IntelliJ window is linked).
# Default mode is the first-party Jeffrey IntelliJ plugin. To use the JFR Profiler plugin instead:
#s
#jeffrey.microscope.ide.base-url=http://localhost:4243

# AI and logging defaults are in settings-mappings.conf (loaded via Typesafe Config)
# Override via command-line args or environment variables
