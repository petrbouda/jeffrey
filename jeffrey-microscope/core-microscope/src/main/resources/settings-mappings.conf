settings {
  properties {
    ai {
      jeffrey.microscope.ai {
        provider = "none"
        model = "claude-opus-4-8"
        max-tokens = "128000"
        base-url = "http://localhost:11434"
        cli-path = "claude"
        timeout-seconds = "120"
        mcp-url = "http://127.0.0.1:8080/api/internal/mcp/claude-code"
      }
    }
    logging {
      logging.level.cafe.jeffrey = "INFO"
    }
    visualization {
      jeffrey.microscope.visualization.flamegraph {
        min-frame-threshold-pct = "0.05"
        frame-text-mode = "single-line"
      }
    }
    ai-export {
      jeffrey.microscope.ai-export.flamegraph {
        min-frame-threshold-pct = "1.0"
      }
    }
  }

  secrets {
    ai {
      jeffrey.microscope.ai {
        api-key = ""
      }
    }
  }
}
